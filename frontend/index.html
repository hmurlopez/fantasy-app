<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Soccer</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    window.APP_CONFIG = { apiBase: "http://localhost:8000" };
  </script>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<nav>
  <div class="brand" id="btn-nav-dashboard">⚽ Fantasy<span>Soccer</span></div>
  <div class="nav-links">
    <span id="user-badge"></span>
    <button id="btn-nav-dashboard">Dashboard</button>
    <button id="btn-nav-squad">My Squad</button>
    <button id="btn-nav-players">Market</button>
    <button id="btn-nav-leagues">Leagues</button>
    <button id="btn-nav-login" class="primary">Log In</button>
    <button id="btn-logout" style="display:none">Log Out</button>
  </div>
</nav>

<main>

  <!-- ── Auth ─────────────────────────────────────────────────────────── -->
  <div id="view-auth" class="view">
    <div class="auth-container">
      <div class="auth-tabs">
        <div class="auth-tab active" data-target="panel-login">Login</div>
        <div class="auth-tab" data-target="panel-register">Register</div>
      </div>

      <div class="card" id="panel-login">
        <form id="login-form">
          <div class="form-group">
            <label>Username</label>
            <input id="login-username" type="text" required placeholder="your_username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input id="login-password" type="password" required placeholder="••••••">
          </div>
          <button class="btn btn-green" style="width:100%">Log In</button>
        </form>
      </div>

      <div class="card auth-panel" id="panel-register" style="display:none">
        <form id="register-form">
          <div class="form-group">
            <label>Username</label>
            <input id="reg-username" type="text" required placeholder="your_username">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input id="reg-email" type="email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input id="reg-password" type="password" required minlength="8" placeholder="••••••••">
          </div>
          <button class="btn btn-green" style="width:100%">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ── Dashboard ─────────────────────────────────────────────────────── -->
  <div id="view-dashboard" class="view">
    <div id="dashboard-content"><p>Loading…</p></div>
  </div>

  <!-- ── Create Team ───────────────────────────────────────────────────── -->
  <div id="view-create-team" class="view">
    <div class="card" style="max-width:440px;margin:2rem auto">
      <h2>Create Your Team</h2>
      <form id="create-team-form">
        <div class="form-group">
          <label>Team Name</label>
          <input id="team-name-input" type="text" required maxlength="50" placeholder="e.g. Galaxy United">
        </div>
        <button class="btn btn-green" style="width:100%">Create Team &amp; Start Playing</button>
      </form>
    </div>
  </div>

  <!-- ── Squad / Pitch ─────────────────────────────────────────────────── -->
  <div id="view-squad" class="view">
    <div class="card">
      <h2>My Squad</h2>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
        <button class="btn btn-green btn-sm" onclick="loadSquad()">Refresh</button>
        <button class="btn btn-outline btn-sm" onclick="navPlayers()">Transfer Market</button>
      </div>
      <div id="pitch-wrap"></div>
    </div>
  </div>

  <!-- ── Transfer Market ───────────────────────────────────────────────── -->
  <div id="view-players" class="view">
    <div class="card">
      <h2>Transfer Market</h2>
      <div class="grid-3" style="margin-bottom:1rem">
        <div class="form-group" style="margin:0">
          <label>Position</label>
          <select id="filter-pos">
            <option value="">All</option>
            <option>GK</option><option>DEF</option><option>MID</option><option>FWD</option>
          </select>
        </div>
        <div class="form-group" style="margin:0">
          <label>Search name</label>
          <input id="filter-search" type="text" placeholder="Player name…">
        </div>
        <div class="form-group" style="margin:0">
          <label>Max price (£m)</label>
          <input id="filter-price" type="number" min="3" max="15" step="0.5" placeholder="e.g. 8.5">
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="player-table">
          <thead>
            <tr>
              <th>Player</th><th>Pos</th><th>Club</th>
              <th>Price</th><th>Pts</th><th></th>
            </tr>
          </thead>
          <tbody id="players-tbody"><tr><td colspan="6">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── Leagues ───────────────────────────────────────────────────────── -->
  <div id="view-leagues" class="view">
    <div class="grid-2" style="align-items:start">
      <div>
        <div class="card">
          <h2>My Leagues</h2>
          <div id="leagues-wrap"><p>Loading…</p></div>
        </div>
      </div>
      <div>
        <div class="card">
          <h2>Create a League</h2>
          <form id="create-league-form">
            <div class="form-group">
              <label>League Name</label>
              <input id="league-name" type="text" required placeholder="e.g. Office Fantasy 2025">
            </div>
            <div class="form-group">
              <label>Format</label>
              <select id="league-type">
                <option value="classic">Classic (cumulative points)</option>
                <option value="h2h">Head-to-Head (weekly matchups)</option>
              </select>
            </div>
            <button class="btn btn-green" style="width:100%">Create League</button>
          </form>
        </div>

        <div class="card">
          <h2>Join a League</h2>
          <form id="join-league-form">
            <div class="form-group">
              <label>Invite Code</label>
              <input id="join-code" type="text" required maxlength="10"
                     placeholder="ABC123" style="text-transform:uppercase;letter-spacing:.2rem;font-size:1.2rem">
            </div>
            <button class="btn btn-accent" style="width:100%">Join League</button>
          </form>
        </div>
      </div>
    </div>
  </div>

</main>

<!-- ── Modals ──────────────────────────────────────────────────────────── -->

<!-- Transfer confirm modal -->
<div id="transfer-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center">
  <div class="card" style="max-width:380px;width:90%;position:relative">
    <button data-close-modal="transfer-modal"
      style="position:absolute;top:.6rem;right:.8rem;background:none;border:none;font-size:1.3rem;cursor:pointer">×</button>
    <h2>Confirm Transfer</h2>
    <p style="margin:.5rem 0">Bringing in: <strong id="transfer-in-name"></strong>
      (<span id="transfer-in-price"></span>)</p>
    <div class="form-group">
      <label>Player to remove</label>
      <select id="transfer-out-select"></select>
    </div>
    <button id="confirm-transfer-btn" class="btn btn-green" style="width:100%">Confirm Transfer</button>
  </div>
</div>

<!-- Standings modal -->
<div id="standings-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center">
  <div class="card" style="max-width:560px;width:95%;position:relative;max-height:80vh;overflow-y:auto">
    <button data-close-modal="standings-modal"
      style="position:absolute;top:.6rem;right:.8rem;background:none;border:none;font-size:1.3rem;cursor:pointer">×</button>
    <h2 id="standings-title">Standings</h2>
    <div id="standings-body" style="margin-top:.75rem"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
